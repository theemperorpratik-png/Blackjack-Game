<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackjack Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Blackjack</h1>
    <h2>"The game that tests your luck"</h2>
    <p class="zero" id="dealer"></p>
    <p class="one" id="messege-el">Want to play a round?😊</p>
    <p class="two" id="card-el">Cards:</p>
    <p class="three" id="sum-el">Sum: </p>
    <div class="but" id="but0" ><button id="ziro" onclick="hit()">Hit</button></div>
    <div class="but" id="but1" ><button id="wan" onclick="startGame()">Start Game</button></div>
    <div class="but" id="but2" ><button id="too" onclick="newCard()">New Card</button></div>
    <p class="four" id="player-el"></p>
    <a href="https://github.com/theemperorpratik-png/Blackjack-Game/blob/main/README.md">About</a>
    <script src="script.js"></script>
